version: '3.8'

services:
  backend:
    build: ./backend
    container_name: qanuni-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://qanuni:qanuni_secret@postgres:5432/qanuni_db
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY={OPENAI_API_KEY}
      - SECRET_KEY={SECRET_KEY:-supersecretkey}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
    networks:
      - qanuni-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: qanuni-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - qanuni-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: qanuni-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=qanuni_db
      - POSTGRES_USER=qanuni
      - POSTGRES_PASSWORD=qanuni_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qanuni -d qanuni_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qanuni-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qanuni-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qanuni-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: qanuni-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - qanuni-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qanuni-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qanuni-network
    restart: unless-stopped

  ocr:
    build: ./ocr
    container_name: qanuni-ocr
    ports:
      - "8001:8001"
    volumes:
      - uploaded_files:/app/uploads
    networks:
      - qanuni-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  qdrant_data:
  uploaded_files:

networks:
  qanuni-network:
    driver: bridge
