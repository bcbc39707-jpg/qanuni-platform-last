version: '3.8'

services:
  backend:
    build: ./backend
    container_name: qanuni-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://qanuni:qanuni_secret@postgres:5432/qanuni_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-aya:8b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./legal_data_json:/app/legal_data_json:ro
      - uploaded_files:/app/uploads
    networks:
      - qanuni-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: qanuni-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - qanuni-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: qanuni-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=qanuni_db
      - POSTGRES_USER=qanuni
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qanuni -d qanuni_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qanuni-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qanuni-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qanuni-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qanuni-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qanuni-network
    restart: unless-stopped

  ocr:
    build: ./ocr
    container_name: qanuni-ocr
    ports:
      - "8001:8001"
    volumes:
      - uploaded_files:/app/uploads
    networks:
      - qanuni-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploaded_files:

networks:
  qanuni-network:
    driver: bridge
